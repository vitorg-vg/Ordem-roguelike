<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordem Roguelike</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="screen-class" class="screen">
<h1>Escolha sua Classe</h1>
<button onclick="selectClass('Combatente')">Combatente</button>
<button onclick="selectClass('Especialista')">Especialista</button>
<button onclick="selectClass('Ocultista')">Ocultista</button>
</div>

<div id="screen-skill" class="screen hidden">
<h1>Escolha uma Habilidade</h1>
<div id="skill-options"></div>
</div>

<div id="screen-weapon" class="screen hidden">
<h1>Sua Arma</h1>
<div id="weapon-result"></div>
<button onclick="startBattle()">Iniciar</button>
</div>

<div id="screen-battle" class="screen hidden">

<div id="hud">
<span id="hpText"></span>
<span id="peText"></span>
</div>

<h2 id="enemyName"></h2>
<div id="enemyBar"><div id="enemyHP"></div></div>

<div id="actions">
<button onclick="playerAttack()">Atacar</button>
<button onclick="renderSkillsBattle()">Habilidades</button>
</div>

<div id="skillsBattle"></div>

</div>

<script src="data.js"></script>
<script src="game.js"></script>
<script src="combat.js"></script>

</body>
</html>
